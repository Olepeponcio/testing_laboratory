name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Instalar proyecto
        run: python -m pip install -e ".[test]"

      - name: Ejecutar suite
        run: python -m pytest --cov=testing_lab --cov-branch --cov-report=term-missing
